<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portafolio de Enrique</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }
        .hero {
            padding: 80px 20px;
            text-align: center;
        }
        .hero h1 {
            font-weight: 700;
            color: #343a40;
        }
        .hero p {
            font-size: 1.2rem;
            color: #6c757d;
        }
        .btn-coqueton {
            background-color: #6f42c1;
            color: white;
            border-radius: 30px;
            padding: 10px 25px;
            transition: 0.3s;
        }
        .btn-coqueton:hover {
            background-color: #563d7c;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Hola mundo 👋</h1>
        <p>Este es mi portafolio.</p>

        <a 
            href="https://enrique-lp.github.io/portafolio/Mi_primer_notebook.html" 
            class="btn btn-coqueton mt-3"
            target="_blank"
        >
            Primera Tarea
        </a>
    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
