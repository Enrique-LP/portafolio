<!DOCTYPE html>

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #f8f9fa;
        }
        .hero {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }
        .card {
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);

            font-weight: bold;

        .footer {

    <div class="container my-5">

                        <a 
                            href="https://github.com/Enrique-LP/portafolio/blob/main/fundamentos_csv_pandas_numpy.ipynb"

                        >
                            Ver tarea
